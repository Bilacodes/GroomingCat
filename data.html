<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar Booking &mdash; MeowSpa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="paw" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="28" height="28" fill="currentColor">
            <circle cx="20" cy="16" r="7"/><circle cx="44" cy="16" r="7"/>
            <circle cx="10" cy="34" r="6.5"/><circle cx="54" cy="34" r="6.5"/>
            <path d="M32 28c12 0 20 9 20 18s-7 13-20 13-20-5-20-13 8-18 20-18z"/>
          </svg>
        </span>
        MeowSpa
      </a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Beranda</a>
        <a href="booking.html" class="nav-link">Booking</a>
        <a href="data.html" class="nav-link is-active">Daftar Booking</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <section class="hero hero-compact">
      <p class="eyebrow">Buku catatan janji temu</p>
      <h1>Daftar booking grooming</h1>
      <p class="hero-sub">Semua booking yang tersimpan di perangkat ini muncul di bawah, terbaru di atas.</p>
    </section>

    <section class="ledger">
      <div class="ledger-toolbar">
        <span id="count-badge" class="count-badge">0 booking</span>
      </div>

      <div class="table-wrap">
        <table class="booking-table">
          <thead>
            <tr>
              <th>Kode</th>
              <th>Pemilik</th>
              <th>No. WA</th>
              <th>Kucing</th>
              <th>Layanan</th>
              <th>Tanggal</th>
              <th>Jam</th>
              <th>Keterangan</th>
            </tr>
          </thead>
          <tbody id="booking-tbody">
            <!-- diisi oleh JavaScript -->
          </tbody>
        </table>
      </div>

      <div id="empty-state" class="empty-state" hidden>
        <span class="paw paw-big" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="40" height="40" fill="currentColor">
            <circle cx="20" cy="16" r="7"/><circle cx="44" cy="16" r="7"/>
            <circle cx="10" cy="34" r="6.5"/><circle cx="54" cy="34" r="6.5"/>
            <path d="M32 28c12 0 20 9 20 18s-7 13-20 13-20-5-20-13 8-18 20-18z"/>
          </svg>
        </span>
        <p>Belum ada booking tercatat.</p>
        <a href="booking.html" class="btn btn-primary btn-small">Buat booking pertama</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">MeowSpa</div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
